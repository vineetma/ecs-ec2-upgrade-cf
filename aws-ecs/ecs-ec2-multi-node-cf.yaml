# ECS Cluster with 2 t3.small EC2 instances, each running 1 nginx hello-world container task.
# AMI is intentionally an older Amazon Linux 2 version to test the EC2 AMI upgrade process later.
AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with 2 t3.small EC2 instances, each running 1 container task.'

Resources:

  # --- VPC ---
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'MyECSVPC'

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway

  MyVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  MyRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC

  MyDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: MyVPCGatewayAttachment
    Properties:
      RouteTableId: !Ref MyRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref MyInternetGateway

  MySubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: 'MyECSSubnet1'

  MySubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.2.0/24'
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: 'MyECSSubnet2'

  MySubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MySubnet1
      RouteTableId: !Ref MyRouteTable

  MySubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MySubnet2
      RouteTableId: !Ref MyRouteTable

  # --- IAM: Required so EC2 instances can register with ECS ---
  ECSInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: 'ECSInstanceRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  ECSInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ECSInstanceRole

  # --- ECS Cluster ---
  MyECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: 'MyECSCluster'

  # --- Security Group ---
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow SSH and HTTP access'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'

  # --- EC2 Instance 1 ---
  MyEC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: 't3.small'
      ImageId: 'ami-0c55b159cbfafe1f0'  # Old Amazon Linux 2 AMI (intentional — for AMI upgrade testing)
      IamInstanceProfile: !Ref ECSInstanceProfile
      SecurityGroupIds:
        - !Ref MySecurityGroup
      SubnetId: !Ref MySubnet1
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Install ECS agent on Amazon Linux 2
          amazon-linux-extras install -y ecs
          echo "ECS_CLUSTER=MyECSCluster" >> /etc/ecs/ecs.config
          systemctl enable --now ecs

  # --- EC2 Instance 2 ---
  MyEC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: 't3.small'
      ImageId: 'ami-0c55b159cbfafe1f0'  # Old Amazon Linux 2 AMI (intentional — for AMI upgrade testing)
      IamInstanceProfile: !Ref ECSInstanceProfile
      SecurityGroupIds:
        - !Ref MySecurityGroup
      SubnetId: !Ref MySubnet2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Install ECS agent on Amazon Linux 2
          amazon-linux-extras install -y ecs
          echo "ECS_CLUSTER=MyECSCluster" >> /etc/ecs/ecs.config
          systemctl enable --now ecs

  # --- ECS Task Definition ---
  # Uses bridge networking (no extra ENI cost, simpler for EC2 launch type without ALB)
  MyTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: 'hello-world-task'
      NetworkMode: bridge  # bridge is correct for EC2 launch type without awsvpc requirement
      ContainerDefinitions:
        - Name: 'hello-world-container'
          Image: 'nginx:latest'  # nginx serves HTTP on port 80 (hello-world exits immediately — not suitable for a service)
          Memory: 128
          Cpu: 256
          Essential: true
          PortMappings:
            - ContainerPort: 80
              HostPort: 80
              Protocol: tcp

  # --- ECS Service: 2 tasks spread across 2 EC2 instances ---
  MyService:
    Type: AWS::ECS::Service
    DependsOn:
      - MyEC2Instance1
      - MyEC2Instance2
    Properties:
      Cluster: !Ref MyECSCluster
      DesiredCount: 2  # 1 task per EC2 instance
      TaskDefinition: !Ref MyTaskDefinition
      LaunchType: EC2
      PlacementStrategies:
        - Type: spread
          Field: instanceId  # Ensures 1 task per instance

Outputs:
  ClusterName:
    Description: 'Name of the ECS Cluster'
    Value: !Ref MyECSCluster
  EC2Instance1Id:
    Description: 'ID of EC2 instance 1'
    Value: !Ref MyEC2Instance1
  EC2Instance2Id:
    Description: 'ID of EC2 instance 2'
    Value: !Ref MyEC2Instance2
  TaskDefinitionArn:
    Description: 'ARN of the Task Definition'
    Value: !Ref MyTaskDefinition
  ServiceName:
    Description: 'Name of the ECS Service'
    Value: !Ref MyService
