# ECS Cluster — 2 t3.small EC2 instances (ASG-managed) each running 1 Node.js task.
# AMI is intentionally the oldest available Amazon Linux 2 — starting point for AMI upgrade exercise.
# See README.md for concept explanations (ASG rolling upgrades, EFS log persistence, SSM access).
AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with ASG-managed EC2 instances, EFS-backed log persistence, and an ALB for round-robin traffic.'

Parameters:
  AppImage:
    Type: String
#    Default: 'vineetma/ecs-hello-world:latest'
    Description: 'Docker Hub image for the Node.js app. Build and push with: docker build -t ecs-hello-world . && docker push YOUR_DOCKERHUB_USERNAME/ecs-hello-world:latest'

Resources:

  # --- VPC ---
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'MyECSVPC'

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway

  MyVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  MyRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC

  MyDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: MyVPCGatewayAttachment
    Properties:
      RouteTableId: !Ref MyRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref MyInternetGateway

  # Two subnets in separate AZs — each subnet is pinned to one physical AZ.
  # The ASG spreads instances across both so a single AZ failure only takes down one instance.
  MySubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: 'MyECSSubnet1'

  MySubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.2.0/24'
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: 'MyECSSubnet2'

  MySubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MySubnet1
      RouteTableId: !Ref MyRouteTable

  MySubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MySubnet2
      RouteTableId: !Ref MyRouteTable

  # --- IAM: Required so EC2 instances can register with ECS ---
  ECSInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: 'ECSInstanceRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore  # SSM shell access — no SSH/key pair needed

  ECSInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ECSInstanceRole

  # --- ECS Cluster ---
  MyECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: 'MyECSCluster'

  # --- Security Groups ---

  # ALB security group: accepts inbound HTTP from the internet.
  # EC2 instances do NOT need to be directly reachable from the internet — all client traffic
  # enters via the ALB, which then forwards to the EC2 instances.
  MyALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow inbound HTTP from the internet to the ALB'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'

  # EC2 instance security group: only allows port 80 from the ALB security group.
  # Direct internet access to port 80 is intentionally blocked — all traffic must flow through the ALB.
  # This is a security improvement over the previous setup that opened 0.0.0.0/0 directly.
  MyEC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow HTTP from ALB only - no direct internet access to container port'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref MyALBSecurityGroup  # ALB → EC2 only; no direct 0.0.0.0/0

  # EFS security group: NFS (2049) from EC2 instances only
  MyEFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow NFS access to EFS from EC2 instances'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref MyEC2SecurityGroup

  # --- EFS: Shared log storage (persists across instance replacements) ---
  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose

  # One mount target per subnet/AZ
  MyEFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      SubnetId: !Ref MySubnet1
      SecurityGroups:
        - !Ref MyEFSSecurityGroup

  MyEFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      SubnetId: !Ref MySubnet2
      SecurityGroups:
        - !Ref MyEFSSecurityGroup

  # --- ALB: single DNS entry point, distributes requests across both EC2 instances ---
  # Cost note: ALB costs ~$0.008/hr base + LCU charges (~$0.008/LCU-hr). For this learning
  # setup the LCU charges will be negligible. Total ALB cost ~$0.008–0.010/hr (~$6–7/month).
  MyALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref MyALBSecurityGroup
      Subnets:
        - !Ref MySubnet1
        - !Ref MySubnet2

  # Target group uses instance mode (not ip mode) — correct for EC2 launch type with bridge networking.
  # ECS registers each EC2 instance + its container host port (80) with this target group automatically
  # when tasks start, and deregisters them when tasks stop.
  # Health check: ALB polls GET / on port 80 every 30s; 2 consecutive 200s = healthy.
  MyTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref MyVPC
      Protocol: HTTP
      Port: 80
      TargetType: instance  # EC2 launch type with bridge networking — register the instance, not the container IP
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'  # Default is 300s — reduced for faster task shutdown in dev/experiment clusters

  # HTTP listener: all traffic on port 80 → forwarded to the target group
  MyListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup

  # --- LaunchTemplate: blueprint for ASG instances. Update ImageId here to trigger rolling AMI upgrade. ---
  # Using ECS-optimized AMI: ECS agent is pre-installed, no manual install needed in UserData.
  # Upgrade path: ami-0dc67873410203528 (2024-03-28) → ami-07bb74bad4a7a0b7a (2026-03-23)
  # UserData is minimal — only the ECS cluster config that must be written before the ECS agent starts.
  # Software installation (amazon-efs-utils) and EFS mounting are handled by SSM State Manager (MyEFSSetupAssociation).
  MyLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        InstanceType: 't3.small'
        ImageId: 'ami-0dc67873410203528'  # amzn2-ami-ecs-hvm-2.0.20240328 — oldest available ECS-optimized AL2, starting point for upgrade exercise
        IamInstanceProfile:
          Arn: !GetAtt ECSInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref MyEC2SecurityGroup
        MetadataOptions:
          HttpTokens: required          # IMDSv2 only — more secure than IMDSv1
          HttpPutResponseHopLimit: 2    # Default is 1; containers on bridge networking add an extra hop,
                                        # so without this, IMDSv2 requests from inside containers are dropped
        UserData:
          Fn::Base64: |
            #!/bin/bash
            # Minimal UserData: only ECS cluster registration.
            # Do NOT call systemctl start ecs here: ecs.service has After=cloud-final.service,
            # so starting it from UserData (which runs inside cloud-final) causes a deadlock.
            # systemd will auto-start ecs after cloud-final completes.
            echo "ECS_CLUSTER=MyECSCluster" > /etc/ecs/ecs.config

  # --- SSM State Manager Association: installs amazon-efs-utils and mounts EFS on every instance ---
  # Runs automatically on each new instance once SSM agent is ready (within ~60s of boot).
  # Targets all EC2 instances in this stack via the aws:cloudformation:stack-name tag.
  # Note: EFS mount happens after ECS agent starts — ECS tasks that need /ecs/logs may fail their
  # first placement and be retried by the service scheduler. HealthCheckGracePeriodSeconds: 60 on
  # the ECS service provides enough buffer for SSM to complete before ALB health checks count.
  MyEFSSetupAssociation:
    Type: AWS::SSM::Association
    DependsOn: MyASG
    Properties:
      AssociationName: !Sub '${AWS::StackName}-efs-setup'
      Name: AWS-RunShellScript
      Targets:
        - Key: 'tag:aws:cloudformation:stack-name'
          Values:
            - !Sub '${AWS::StackName}'
      Parameters:
        commands:
          - 'yum install -y amazon-efs-utils'
          - 'mkdir -p /ecs/logs/nginx'
          - !Sub 'grep -q "${MyEFSFileSystem}" /etc/fstab || echo "${MyEFSFileSystem}:/ /ecs/logs efs defaults,_netdev,nofail 0 0" >> /etc/fstab'
          - 'mount -a || echo "EFS mount failed - will retry on reconnect (nofail set)"'
      WaitForSuccessTimeoutSeconds: 300

  # --- ASG: rolling update replaces one instance at a time, keeps min 1 running ---
  MyASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - MyEFSMountTarget1
      - MyEFSMountTarget2
    Properties:
      MinSize: '2'
      MaxSize: '3'  # Temporarily allows 3 during rolling upgrade (2 running + 1 new)
      DesiredCapacity: '2'
      LaunchTemplate:
        LaunchTemplateId: !Ref MyLaunchTemplate
        Version: !GetAtt MyLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref MySubnet1
        - !Ref MySubnet2
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MaxBatchSize: 1
        MinInstancesInService: 1
        PauseTime: PT2M

  # --- ECS Task Definition: bridge networking, nginx logs mapped to EFS via host volume ---
  # HostPort 80 is fixed (not dynamic port 0) because we have exactly 1 task per EC2 instance.
  # The ALB target group registers instances on port 80 in instance mode.
  MyTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: 'hello-world-task'
      NetworkMode: bridge
      ContainerDefinitions:
        - Name: 'hello-world-container'
          Image: !Ref AppImage
          Memory: 256
          Cpu: 256
          Essential: true
          Environment:
            - Name: PORT
              Value: '3000'
          PortMappings:
            - ContainerPort: 3000
              HostPort: 80  # ALB target group registers instance:80; host maps 80 → container 3000
              Protocol: tcp
          StopTimeout: 10  # Node.js handles SIGTERM cleanly; 10s is more than enough

  # --- ECS Service: 2 tasks spread across 2 EC2 instances, registered with ALB target group ---
  # DependsOn MyListener: ECS service requires the listener to exist before it can register tasks
  # with the target group (CloudFormation does not infer this dependency automatically).
  # HealthCheckGracePeriodSeconds: gives nginx time to start before ALB health checks begin.
  # Without this, ECS may see the first health check fail (nginx not yet up) and kill the task.
  MyService:
    Type: AWS::ECS::Service
    DependsOn:
      - MyASG
      - MyListener  # ALB listener must exist before ECS can attach to the target group
    Properties:
      Cluster: !Ref MyECSCluster
      DesiredCount: 2
      TaskDefinition: !Ref MyTaskDefinition
      LaunchType: EC2
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 0    # Required with fixed HostPort: stop old task first to free the port,
                                    # then start new task. Without this, ECS tries to run both simultaneously
                                    # and deadlocks because port 80 is already occupied on both instances.
        MaximumPercent: 100         # Never exceed desired count — consistent with stop-before-start approach
      LoadBalancers:
        - ContainerName: 'hello-world-container'
          ContainerPort: 3000
          TargetGroupArn: !Ref MyTargetGroup
      PlacementStrategies:
        - Type: spread
          Field: instanceId  # Spreads tasks across instances — 1 task per EC2, so ALB sees both

Outputs:
  ALBDNSName:
    Description: 'ALB DNS name — open this in a browser or use with curl to validate round-robin'
    Value: !Sub 'http://${MyALB.DNSName}'
  ClusterName:
    Description: 'Name of the ECS Cluster'
    Value: !Ref MyECSCluster
  EFSFileSystemId:
    Description: 'EFS File System ID (logs persist here across instance replacements)'
    Value: !Ref MyEFSFileSystem
  ASGName:
    Description: 'Auto Scaling Group name'
    Value: !Ref MyASG
  TaskDefinitionArn:
    Description: 'ARN of the Task Definition'
    Value: !Ref MyTaskDefinition
  ServiceName:
    Description: 'Name of the ECS Service'
    Value: !Ref MyService
